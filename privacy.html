    <h2>1. 数据收集</h2>
    <p>心迹 是一款本地情绪记录应用，所有数据仅存储在您的设备上，不会上传到任何服务器。</p>

    <h2>3. 数据安全</h2>
    <p>应用使用iOS系统提供的本地存储机制，数据仅在您的设备内进行加密存储。</p>
    
    <h2>4. 第三方服务</h2>
    <p>本应用不使用任何第三方分析、广告或追踪服务。</p>
